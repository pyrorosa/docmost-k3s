global:
  namespace: docmost
  imagePullPolicy: IfNotPresent
  createNamespace: false

docmost:
  enabled: true
  replicaCount: 1
  image:
    repository: docmost/docmost
    tag: 0.90.0
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  storage:
    size: 10Gi
    storageClass: local-path
  probes:
    liveness:
      path: /api/health
      initialDelaySeconds: 30
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 3
    readiness:
      path: /api/health
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
  config:
    redisUrl: "redis://docmost-redis:6379"

nginx:
  enabled: true
  replicaCount: 1
  image:
    repository: nginx
    tag: 1.29.3-alpine
  config:
    serverName: localhost
    clientMaxBodySize: 50M
    proxyTimeout: 60s
    allowedNetworks:
      - 127.0.0.1
      - 10.42.0.0/16
      - 10.0.0.0/8
      - 192.168.0.0/16
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"

postgres:
  enabled: true
  image:
    repository: postgres
    tag: "18"
  storage:
    size: 10Gi
    storageClass: local-path
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

redis:
  enabled: true
  image:
    repository: redis
    tag: "8"
  storage:
    size: 5Gi
    storageClass: local-path
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

secrets:
  app:
    dbPassword: ""
    databaseUrl: ""
    appSecret: ""
    telegramBotToken: ""
    telegramChatId: ""
    grafanaPassword: ""
    httpProxy: ""
    httpsProxy: ""
    noProxy: ""
  createFromValues: true

monitoring:
  enabled: true
  prometheus:
    enabled: true
    image:
      repository: prom/prometheus
      tag: v3.11.0
    service:
      nodePort: 30900
    storage:
      size: 5Gi
      storageClass: local-path
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "2Gi"
        cpu: "1000m"
    config:
      scrapeInterval: 15s
      evaluationInterval: 15s
  grafana:
    enabled: true
    image:
      repository: grafana/grafana
      tag: 13.0.1
    service:
      nodePort: 30300
    storage:
      size: 5Gi
      storageClass: local-path
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "1Gi"
        cpu: "500m"
  loki:
    enabled: true
    image:
      repository: grafana/loki
      tag: 3.7.2
    config:
      compactor:
        delete_request_store: filesystem
    storage:
      size: 10Gi
      storageClass: local-path
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "1Gi"
        cpu: "500m"
  alertmanager:
    enabled: true
    image:
      repository: prom/alertmanager
      tag: v0.32.1
    storage:
      size: 2Gi
      storageClass: local-path
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "256Mi"
        cpu: "200m"
    telegram:
      botToken: "8272873030:AAErXez0Y2Yw4n_NykTOT8rbJHwnYCYsv_k"
      chatId: "1168742163"
  nodeExporter:
    enabled: true
    image:
      repository: prom/node-exporter
      tag: v1.11.1
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "100m"
  cadvisor:
    enabled: true
    image:
      repository: gcr.io/cadvisor/cadvisor
      tag: v0.55.1
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  alloy:
    enabled: true
    image:
      repository: grafana/alloy
      tag: v1.16.1
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  kubeStateMetrics:
    enabled: true
    image:
      repository: registry.k8s.io/kube-state-metrics/kube-state-metrics
      tag: v2.17.0
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "250m"
  blackboxExporter:
    enabled: true
    image:
      repository: prom/blackbox-exporter
      tag: v0.27.0
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "100m"
  postgresExporter:
    enabled: true
    image:
      repository: quay.io/prometheuscommunity/postgres-exporter
      tag: v0.17.0
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "100m"
  redisExporter:
    enabled: true
    image:
      repository: oliver006/redis_exporter
      tag: v1.76.0
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "100m"
  nginxExporter:
    enabled: true
    image:
      repository: nginx/nginx-prometheus-exporter
      tag: 1.3.0
    resources:
      requests:
        memory: "32Mi"
        cpu: "25m"
      limits:
        memory: "64Mi"
        cpu: "50m"

ingress:
  enabled: false
  className: traefik
  host: docmost.local
