{{- if .Values.nginx.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "docmost.name" . }}-nginx-config
  namespace: {{ .Values.global.namespace }}
data:
  default.conf: |
    server {
        listen 80;
        server_name {{ .Values.nginx.config.serverName }};
        client_max_body_size {{ .Values.nginx.config.clientMaxBodySize }};
        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log warn;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;
        proxy_connect_timeout 10s;
        proxy_send_timeout {{ .Values.nginx.config.proxyTimeout }};
        proxy_read_timeout {{ .Values.nginx.config.proxyTimeout }};
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
        location / {
            proxy_pass http://{{ include "docmost.name" . }}-docmost:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
        }
        location /stub_status {
            stub_status;
            access_log off;
            {{- range .Values.nginx.config.allowedNetworks }}
            allow {{ . }};
            {{- end }}
            deny all;
        }
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
{{- end }}
