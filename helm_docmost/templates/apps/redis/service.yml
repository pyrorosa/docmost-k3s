apiVersion: v1
kind: Service
metadata:
  name: docmost-redis
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app.kubernetes.io/component: redis
    app.kubernetes.io/name: docmost
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
