{{- if and .Values.monitoring.enabled .Values.monitoring.prometheus.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "docmost.name" . }}-prometheus-config
  namespace: {{ .Values.global.namespace }}
data:
  prometheus.yml: |
    global:
      scrape_interval: {{ .Values.monitoring.prometheus.config.scrapeInterval | default "15s" }}
      evaluation_interval: {{ .Values.monitoring.prometheus.config.evaluationInterval | default "15s" }}
    alerting:
      alertmanagers:
      - static_configs:
        - targets: ['{{ include "docmost.name" . }}-alertmanager:9093']
    rule_files:
    - "rules/*.yml"
    scrape_configs:
    - job_name: 'prometheus'
      static_configs:
      - targets: ['{{ include "docmost.name" . }}-prometheus:9090']
    - job_name: 'alertmanager'
      static_configs:
      - targets: ['{{ include "docmost.name" . }}-alertmanager:9093']
    - job_name: 'node-exporter'
      static_configs:
      - targets: ['{{ include "docmost.name" . }}-node-exporter:9100']
    - job_name: 'cadvisor'
      static_configs:
      - targets: ['{{ include "docmost.name" . }}-cadvisor:8080']
    - job_name: 'postgres-exporter'
      static_configs:
      - targets: ['{{ include "docmost.name" . }}-postgres-exporter:9187']
    - job_name: 'redis-exporter'
      static_configs:
      - targets: ['{{ include "docmost.name" . }}-redis-exporter:9121']
    - job_name: 'nginx-exporter'
      static_configs:
      - targets: ['{{ include "docmost.name" . }}-nginx-exporter:9113']
    - job_name: 'kube-state-metrics'
      static_configs:
      - targets:
        - {{ include "docmost.name" . }}-kube-state-metrics:8080
    - job_name: 'blackbox-http'
      metrics_path: /probe
      params:
        module: [http_2xx]
      static_configs:
      - targets:
        - http://{{ include "docmost.name" . }}-nginx:80
        - http://{{ include "docmost.name" . }}-docmost:3000/api/health
      relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: {{ include "docmost.name" . }}-blackbox-exporter:9115
    - job_name: 'blackbox-tcp'
      metrics_path: /probe
      params:
        module: [tcp_connect]
      static_configs:
      - targets:
        - {{ include "docmost.name" . }}-postgres:5432
        - {{ include "docmost.name" . }}-redis:6379
      relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: {{ include "docmost.name" . }}-blackbox-exporter:9115
{{- end }}
