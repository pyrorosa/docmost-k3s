{{- if and .Values.monitoring.enabled .Values.monitoring.alertmanager.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "docmost.name" . }}-alertmanager-templates
  namespace: {{ .Values.global.namespace }}
data:
  telegram.tmpl: |
    {{`{{ define "telegram.message" }}
    {{- if gt (len .Alerts.Firing) 0 }}
    🔴 Alerts Firing:
    {{ range .Alerts.Firing }}
    ━━━━━━━━━━━━━━
    🚨 {{ .Annotations.title }}
    📝 {{ .Annotations.summary }}
    {{ .Annotations.description }}
    ⏰ Started: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
    {{- if .Labels.severity }}
    🔖 Severity: {{ .Labels.severity }}
    {{- end }}
    {{ end }}
    {{- end }}

    {{- if gt (len .Alerts.Resolved) 0 }}
    🟢 Alerts Resolved:
    {{ range .Alerts.Resolved }}
    ━━━━━━━━━━━━━━
    ✅ {{ .Annotations.title }}
    📝 {{ .Annotations.summary }}
    ⏰ Resolved: {{ .EndsAt.Format "2006-01-02 15:04:05" }}
    {{ end }}
    {{- end }}
    {{ end }}`}}
{{- end }}
