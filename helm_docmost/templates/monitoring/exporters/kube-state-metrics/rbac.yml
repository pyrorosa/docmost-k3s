{{- if and .Values.monitoring.enabled .Values.monitoring.kubeStateMetrics.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "docmost.name" . }}-kube-state-metrics
  namespace: {{ .Values.global.namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "docmost.name" . }}-kube-state-metrics
rules:
- apiGroups: [""]
  resources:
  - pods
  - services
  - nodes
  - namespaces
  - persistentvolumeclaims
  - persistentvolumes
  - configmaps
  verbs: ["list", "watch"]
- apiGroups: ["apps"]
  resources:
  - deployments
  - daemonsets
  - statefulsets
  - replicasets
  verbs: ["list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "docmost.name" . }}-kube-state-metrics
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "docmost.name" . }}-kube-state-metrics
subjects:
- kind: ServiceAccount
  name: {{ include "docmost.name" . }}-kube-state-metrics
  namespace: {{ .Values.global.namespace }}
{{- end }}
