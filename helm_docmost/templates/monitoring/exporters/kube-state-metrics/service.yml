{{- if and .Values.monitoring.enabled .Values.monitoring.kubeStateMetrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "docmost.name" . }}-kube-state-metrics
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "docmost.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "docmost.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: kube-state-metrics
  ports:
  - name: http
    port: 8080
    targetPort: 8080
{{- end }}
