apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: docmost
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      securityContext:
        fsGroup: 10001
        fsGroupChangePolicy: "OnRootMismatch"
      containers:
      - name: loki
        image: grafana/loki:3.7.2
        securityContext:
          runAsUser: 10001
          runAsGroup: 10001
          allowPrivilegeEscalation: false
        ports:
        - containerPort: 3100
          name: http
        args:
        - -config.file=/etc/loki/loki-config.yaml
        volumeMounts:
        - name: loki-config
          mountPath: /etc/loki/loki-config.yaml
          subPath: loki-config.yaml
          readOnly: true
        - name: loki-data
          mountPath: /loki
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      volumes:
      - name: loki-config
        configMap:
          name: loki-config
      - name: loki-data
        persistentVolumeClaim:
          claimName: loki-data
      restartPolicy: Always
