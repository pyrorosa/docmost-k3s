apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-exporter
  namespace: docmost
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-exporter
  template:
    metadata:
      labels:
        app: nginx-exporter
    spec:
      containers:
        - name: nginx-exporter
          image: nginx/nginx-prometheus-exporter:1.5.1
          ports:
            - containerPort: 9113
              name: metrics
          args:
            - '-nginx.scrape-uri=http://nginx:80/stub_status'
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "50m"
      restartPolicy: Always
