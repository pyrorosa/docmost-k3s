---
- name: Common setup
  hosts: k3s_cluster
  become: true
  vars_files:
    - ../group_vars/all.yml

  roles:
    - common

- name: Install K3s server
  hosts: k3s_server
  become: true
  vars_files:
    - ../group_vars/all.yml

  roles:
    - k3s-server

- name: Install K3s agents
  hosts: k3s_agents
  become: true
  vars_files:
    - ../group_vars/all.yml

  roles:
    - k3s-agent
